name: Build and verify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build the server bundle (Vite SSR -> dist/app.js + dist/public).
      - name: Build
        run: npm run build

      # Smoke test: start the server in the background, confirm it responds,
      # then stop it. `npm start` runs indefinitely, so it must not block the job.
      - name: Start and verify server
        run: |
          npm start &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            if curl -fsS http://localhost:3000/api/v1/patients > /dev/null; then
              echo "Server responded successfully."
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Server did not respond in time." >&2
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done
          kill "$SERVER_PID" 2>/dev/null || true
